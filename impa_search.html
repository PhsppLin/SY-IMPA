<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPA 物料語意搜尋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #2563eb;
    --accent2: #60a5fa;
    --accent3: #93c5fd;
    --text: #f0f4ff;
    --text2: #94a3b8;
    --text3: #475569;
    --success: #34d399;
    --warning: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,0.15) 0%, transparent 60%), var(--bg);
  }
  .login-box {
    width: 100%; max-width: 360px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 2.5rem 2rem;
  }
  .login-logo {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    font-size: 24px;
  }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.04em; }
  .field-input {
    width: 100%; padding: 11px 14px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none; transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .field-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 12px;
    background: var(--accent); border: none;
    border-radius: var(--radius-sm);
    color: #fff; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error {
    margin-top: 0.75rem; font-size: 12px;
    color: #f87171; text-align: center;
    padding: 8px; background: rgba(248,113,113,0.1);
    border-radius: var(--radius-sm); display: none;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* APP */
  #app { display: none; min-height: 100vh; }

  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .top-logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .top-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: 0.02em; }
  .top-user { font-size: 11px; color: var(--text3); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn {
    font-size: 12px; color: var(--text3);
    background: none; border: 0.5px solid var(--border2);
    cursor: pointer; padding: 4px 10px;
    border-radius: 20px; font-family: 'Noto Sans TC', sans-serif;
  }
  .logout-btn:hover { color: var(--text2); }

  /* SEARCH AREA */
  .search-area { padding: 1.25rem 1rem 0.75rem; max-width: 720px; margin: 0 auto; }
  .search-box {
    display: flex; gap: 8px; align-items: center;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px 16px;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-icon { font-size: 18px; color: var(--text3); flex-shrink: 0; }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-controls { display: flex; gap: 8px; }
  .cat-select {
    flex: 1; padding: 9px 12px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none; cursor: pointer;
  }
  .search-btn {
    padding: 9px 20px;
    background: var(--accent); border: none;
    border-radius: var(--radius-sm);
    color: #fff; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
    transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .search-btn:hover { opacity: 0.9; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .clear-btn {
    padding: 9px 14px;
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2); font-size: 13px;
    cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  }

  /* QUICK TAGS */
  .quick-tags { padding: 0 1rem 1rem; max-width: 720px; margin: 0 auto; }
  .quick-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag {
    font-size: 12px; padding: 4px 10px;
    background: var(--surface); color: var(--text2);
    border: 0.5px solid var(--border2);
    border-radius: 20px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .q-tag:hover { background: var(--surface2); color: var(--accent3); border-color: var(--accent); }

  /* RESULTS */
  .results-area { padding: 0 1rem 6rem; max-width: 720px; margin: 0 auto; }
  .result-meta { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }

  .loading-state { text-align: center; padding: 4rem 2rem; color: var(--text3); font-size: 13px; display: none; }
  .loading-dots span {
    display: inline-block; width: 6px; height: 6px;
    background: var(--accent2); border-radius: 50%;
    margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .empty-state {
    text-align: center; padding: 4rem 2rem;
    color: var(--text3); font-size: 14px; line-height: 2;
  }
  .empty-icon { font-size: 40px; margin-bottom: 0.5rem; }

  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    animation: fadeUp 0.2s ease both;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .result-card:hover { border-color: var(--border2); }
  .result-card.expanded { border-color: var(--accent); }

  .card-header {
    padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .card-code {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent2);
    background: rgba(37,99,235,0.12);
    padding: 3px 7px; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px;
  }
  .card-main { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; line-height: 1.4; }
  .card-title-cht { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .cat-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    background: rgba(37,99,235,0.12); color: var(--accent3);
  }
  .unit-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    background: var(--surface2); color: var(--text2);
  }
  .sim-wrap { display: flex; align-items: center; gap: 5px; margin-left: auto; }
  .sim-label { font-size: 10px; color: var(--text3); }
  .sim-bar { width: 48px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .sim-fill { height: 100%; border-radius: 2px; }
  .sim-pct { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text2); min-width: 32px; text-align: right; }
  .expand-arrow { font-size: 12px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .result-card.expanded .expand-arrow { transform: rotate(180deg); }

  /* EXPANDED DETAIL */
  .card-detail {
    border-top: 0.5px solid var(--border);
    padding: 12px 14px;
    display: none;
    animation: fadeIn 0.15s ease;
  }
  .result-card.expanded .card-detail { display: block; }
  .detail-section { margin-bottom: 12px; }
  .detail-heading {
    font-size: 10px; color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 5px; padding-bottom: 4px;
    border-bottom: 0.5px solid var(--border);
  }
  .detail-text { font-size: 12px; color: var(--text); line-height: 1.7; }
  .detail-text-cht { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .detail-item { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
  .detail-item-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .detail-item-val { font-size: 13px; font-weight: 500; }
  .copy-btn {
    margin-top: 10px; width: 100%; padding: 8px;
    background: rgba(37,99,235,0.1);
    border: 0.5px solid rgba(37,99,235,0.3);
    border-radius: var(--radius-sm);
    color: var(--accent2); font-size: 12px; font-weight: 500;
    cursor: pointer; text-align: center;
    transition: background 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .copy-btn:hover { background: rgba(37,99,235,0.18); }
  .copy-btn.copied { color: var(--success); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); }

  /* RAG 預留區塊 */
  .rag-placeholder {
    background: var(--surface);
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .rag-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.05em; }
  .rag-content { font-size: 13px; color: var(--text2); line-height: 1.7; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (min-width: 640px) {
    .search-area, .quick-tags, .results-area { padding-left: 1.5rem; padding-right: 1.5rem; }
    .top-bar { padding: 0.75rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚓</div>
    <div class="login-title">IMPA 物料查詢</div>
    <div class="login-sub">語意搜尋系統　請登入以繼續</div>
    <div class="field-label">電子郵件</div>
    <input class="field-input" type="email" id="email-input" placeholder="your@email.com" autocomplete="email">
    <div class="field-label">密碼</div>
    <input class="field-input" type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="login-text">登入</span>
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-logo">⚓</div>
    <div class="top-title">IMPA 物料語意搜尋</div>
    <div class="top-user" id="top-user"></div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <div class="search-area">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="text"
        placeholder="用任何描述搜尋，例如：充氣救生筏 6人、直徑8mm馬尼拉繩、bronze valve small size">
    </div>
    <div class="search-controls">
      <select class="cat-select" id="cat-select">
        <option value="all">全部分類</option>
        <option value="00&10">食品與蔬菜</option>
        <option value="11">健身與運動設備</option>
        <option value="15">寢具與布品</option>
        <option value="17">餐具與廚具</option>
        <option value="19">手套與防護衣</option>
        <option value="21">繩索與索具</option>
        <option value="23">卸扣與索具配件</option>
        <option value="25">船舶塗料</option>
        <option value="27">噴漆設備</option>
        <option value="31">安全頭盔與護具</option>
        <option value="33">救生設備</option>
        <option value="35">橡膠管與配件</option>
        <option value="37">航行信號設備</option>
        <option value="39">急救與醫療設備</option>
        <option value="45">燃料與化學品</option>
        <option value="47">文具與辦公用品</option>
        <option value="49">門鎖與五金</option>
        <option value="51">油漆刷與塗裝工具</option>
        <option value="53">水管與衛浴配件</option>
        <option value="55">清潔用品</option>
        <option value="59">氣動工具</option>
        <option value="61">手工具套組</option>
        <option value="63">鑽頭與切削工具</option>
        <option value="65">量測工具</option>
        <option value="67">鋼材與金屬材料</option>
        <option value="69">螺栓與螺帽</option>
        <option value="71">鋼管與管材</option>
        <option value="73">管件與接頭</option>
        <option value="75">閥門</option>
        <option value="77">軸承</option>
        <option value="79">燈泡與電氣耗材</option>
        <option value="81">填料與密封材料</option>
        <option value="85">高壓氣體</option>
        <option value="87">機械維修設備</option>
      </select>
      <button class="search-btn" id="search-btn" onclick="doSearch()">
        <span>搜尋</span>
      </button>
      <button class="clear-btn" onclick="clearSearch()">清除</button>
    </div>
  </div>

  <div class="quick-tags">
    <div class="quick-label">熱門搜尋</div>
    <div class="tag-row">
      <span class="q-tag" onclick="quickSearch('充氣救生筏')">充氣救生筏</span>
      <span class="q-tag" onclick="quickSearch('bronze valve')">Bronze valve</span>
      <span class="q-tag" onclick="quickSearch('馬尼拉繩 8mm')">馬尼拉繩 8mm</span>
      <span class="q-tag" onclick="quickSearch('safety helmet')">Safety helmet</span>
      <span class="q-tag" onclick="quickSearch('氣動扳手')">氣動扳手</span>
      <span class="q-tag" onclick="quickSearch('軸承 內徑 10mm')">軸承 內徑 10mm</span>
      <span class="q-tag" onclick="quickSearch('oxygen cylinder')">Oxygen cylinder</span>
    </div>
  </div>

  <div class="results-area">
    <!-- RAG 預留區塊（之後啟用） -->
    <div class="rag-placeholder" id="rag-block">
      <div class="rag-label">AI 建議</div>
      <div class="rag-content" id="rag-content"></div>
    </div>

    <div class="loading-state" id="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div style="margin-top:12px">語意搜尋中...</div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⚓</div>
      輸入描述後按搜尋<br>
      <span style="font-size:12px">支援中英文混合查詢</span>
    </div>

    <div class="result-meta" id="result-meta" style="display:none"></div>
    <div id="results-list"></div>
  </div>
</div>

<script>
const SUPABASE_URL  = "https://mokdxdqyjjbolwyygoso.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1va2R4ZHF5ampib2x3eXlnb3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDgxNTgsImV4cCI6MjA4OTM4NDE1OH0.6lEBI_GSk_EtufMKdunZttpUaFuWngfGZw04kPNBWfA";
const EDGE_FN_URL   = `${SUPABASE_URL}/functions/v1/impa-search`;

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// 分類對照
const CAT_NAMES = {
  "00&10":"食品與蔬菜","11":"健身與運動設備","15":"寢具與布品",
  "17":"餐具與廚具","19":"手套與防護衣","21":"繩索與索具",
  "23":"卸扣與索具配件","25":"船舶塗料","27":"噴漆設備",
  "31":"安全頭盔與護具","33":"救生設備","35":"橡膠管與配件",
  "37":"航行信號設備","39":"急救與醫療設備","45":"燃料與化學品",
  "47":"文具與辦公用品","49":"門鎖與五金","51":"油漆刷與塗裝工具",
  "53":"水管與衛浴配件","55":"清潔用品","59":"氣動工具",
  "61":"手工具套組","63":"鑽頭與切削工具","65":"量測工具",
  "67":"鋼材與金屬材料","69":"螺栓與螺帽","71":"鋼管與管材",
  "73":"管件與接頭","75":"閥門","77":"軸承",
  "79":"燈泡與電氣耗材","81":"填料與密封材料","85":"高壓氣體",
  "87":"機械維修設備"
};

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pw    = document.getElementById('pw-input').value;
  const btn   = document.getElementById('login-btn');
  const spin  = document.getElementById('spinner');
  const txt   = document.getElementById('login-text');
  const err   = document.getElementById('login-error');

  err.style.display = 'none';
  btn.disabled = true; spin.style.display = 'block'; txt.textContent = '登入中...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  btn.disabled = false; spin.style.display = 'none'; txt.textContent = '登入';

  if (error) {
    err.style.display = 'block';
    err.textContent = '帳號或密碼錯誤，請再試一次';
    return;
  }
  showApp(data.user.email);
}

async function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('email-input').value = '';
  document.getElementById('pw-input').value = '';
  clearSearch();
  sb.auth.signOut();
}

function showApp(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('top-user').textContent = email;
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp(session.user.email);
});

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-input').focus(); });
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ── SEARCH ──
function quickSearch(text) {
  document.getElementById('search-input').value = text;
  doSearch();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('cat-select').value = 'all';
  document.getElementById('results-list').innerHTML = '';
  document.getElementById('result-meta').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('rag-block').style.display = 'none';
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  const cat   = document.getElementById('cat-select').value;
  const btn   = document.getElementById('search-btn');

  if (!query) return;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results-list').innerHTML = '';
  document.getElementById('result-meta').style.display = 'none';
  btn.disabled = true;

  try {
    const { data: { session } } = await sb.auth.getSession();
    const token = session?.access_token;

    const res = await fetch(EDGE_FN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        'apikey': SUPABASE_ANON,
      },
      body: JSON.stringify({ query, category_code: cat, limit: 10 })
    });

    const json = await res.json();
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;

    if (json.error) throw new Error(json.error);

    const results = json.results || [];
    if (!results.length) {
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('empty-state').innerHTML =
        '<div class="empty-icon">😔</div>找不到相關結果<br><span style="font-size:12px">請嘗試其他描述</span>';
      return;
    }

    document.getElementById('result-meta').style.display = 'block';
    document.getElementById('result-meta').textContent = `找到 ${results.length} 筆相關結果`;
    renderResults(results);

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('empty-state').innerHTML =
      '<div class="empty-icon">⚠️</div>搜尋發生錯誤<br><span style="font-size:12px">' + e.message + '</span>';
  }
}

function simColor(sim) {
  if (sim >= 0.75) return '#34d399';
  if (sim >= 0.55) return '#fbbf24';
  return '#94a3b8';
}

function renderResults(results) {
  const list = document.getElementById('results-list');
  list.innerHTML = results.map((r, i) => {
    const sim = r.similarity || 0;
    const simPct = Math.round(sim * 100);
    const color  = simColor(sim);
    const catName = CAT_NAMES[r.category_code] || r.category_code;

    return `
      <div class="result-card" id="card-${i}" style="animation-delay:${i*0.04}s" onclick="toggleCard(${i})">
        <div class="card-header">
          <div class="card-code">${r.code}</div>
          <div class="card-main">
            <div class="card-title">${r.title || ''}</div>
            <div class="card-title-cht">${r.title_cht || ''}</div>
            <div class="card-footer">
              <div class="cat-badge">${catName}</div>
              <div class="unit-badge">${r.unit || ''}</div>
              <div class="sim-wrap">
                <div class="sim-label">相似度</div>
                <div class="sim-bar">
                  <div class="sim-fill" style="width:${simPct}%;background:${color}"></div>
                </div>
                <div class="sim-pct" style="color:${color}">${simPct}%</div>
              </div>
              <div class="expand-arrow">▼</div>
            </div>
          </div>
        </div>
        <div class="card-detail">
          ${r.specification ? `
          <div class="detail-section">
            <div class="detail-heading">英文規格</div>
            <div class="detail-text">${r.specification}</div>
          </div>` : ''}
          ${r.specification_cht ? `
          <div class="detail-section">
            <div class="detail-heading">中文規格</div>
            <div class="detail-text-cht">${r.specification_cht}</div>
          </div>` : ''}
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-item-label">分類</div>
              <div class="detail-item-val" style="font-size:12px">${catName}</div>
            </div>
            <div class="detail-item">
              <div class="detail-item-label">單位</div>
              <div class="detail-item-val">${r.unit || '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-item-label">頁碼</div>
              <div class="detail-item-val">${r.page_no || '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-item-label">相似度</div>
              <div class="detail-item-val" style="color:${color}">${simPct}%</div>
            </div>
          </div>
          <button class="copy-btn" id="copy-${i}" onclick="copyCode(event, '${r.code}', ${i})">
            複製 IMPA Code：${r.code}
          </button>
        </div>
      </div>`;
  }).join('');
}

function toggleCard(i) {
  const card = document.getElementById(`card-${i}`);
  card.classList.toggle('expanded');
}

function copyCode(e, code, i) {
  e.stopPropagation();
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById(`copy-${i}`);
    btn.textContent = '✓ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = `複製 IMPA Code：${code}`;
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
